<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="glowExo" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="exoBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B0764"/>
      <stop offset="100%" stop-color="#120321"/>
    </linearGradient>
    <linearGradient id="exoFrame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8B4FE"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#glowExo)"/>
  <circle cx="100" cy="46" r="22" fill="#1B0733" stroke="url(#exoFrame)" stroke-width="2"/>
  <rect x="90" y="62" width="20" height="16" fill="#1B0733"/>
  <!-- exo frame arms -->
  <path d="M40 92 L58 84 L64 168 L44 176 Z" fill="url(#exoFrame)"/>
  <path d="M160 92 L142 84 L136 168 L156 176 Z" fill="url(#exoFrame)"/>
  <!-- torso -->
  <path d="M58 80 Q100 66 142 80 L150 170 Q100 186 50 170 Z" fill="url(#exoBody)"/>
  <!-- rib frame lines -->
  <path d="M70 92 L130 92 M66 108 L134 108 M64 126 L136 126 M64 144 L136 144" stroke="url(#exoFrame)" stroke-width="3" opacity="0.85"/>
  <!-- core -->
  <circle cx="100" cy="118" r="13" fill="#0B0116" stroke="url(#exoFrame)" stroke-width="3"/>
  <circle cx="100" cy="118" r="5.5" fill="#E9D5FF"/>
  <!-- shoulders -->
  <circle cx="52" cy="86" r="15" fill="url(#exoFrame)"/>
  <circle cx="148" cy="86" r="15" fill="url(#exoFrame)"/>
  <circle cx="52" cy="86" r="6" fill="#1B0733"/>
  <circle cx="148" cy="86" r="6" fill="#1B0733"/>
